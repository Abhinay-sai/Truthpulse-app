name: truthpulse
description: "TruthPulse AI Media Authenticity Analyzer"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  http: ^1.2.1
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  file_picker: ^11.0.2
  shared_preferences: ^2.3.2
  google_fonts: ^8.1.0
  record: ^6.2.1
  path_provider: ^2.1.5
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/truthpulse_app_logo.png
    - assets/icons/