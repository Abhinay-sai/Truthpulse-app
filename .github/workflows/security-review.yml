name: Security Review Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    env:
      TECH: Unknown
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Technology Stack
        id: detect
        run: |
          if [ -f "backend/package.json" ]; then
            echo "TECH=Node.js" >> $GITHUB_ENV
            echo "Detected Node.js Backend"
          else
            echo "TECH=Unknown" >> $GITHUB_ENV
          fi

      - name: Setup Node.js (If Node.js Backend)
        if: env.TECH == 'Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        if: env.TECH == 'Node.js'
        working-directory: ./backend
        run: npm install

      - name: Dependency Scanning (npm audit)
        if: env.TECH == 'Node.js'
        working-directory: ./backend
        run: npm audit --json > audit.json || true

      - name: SAST Scanning (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"
          generateSarif: "1"
        # We don't fail on SAST findings right now to prevent blocking CI
        continue-on-error: true

      - name: Dynamic API Checks (Mocked DAST)
        run: |
          echo "Simulating API tests against target..."
          echo "Completed DAST checks (Non-destructive)."

      - name: Generate Security Reports
        if: env.TECH == 'Node.js'
        working-directory: ./backend
        run: |
          npm install exceljs
          node scripts/generate-security-reports.js

      - name: Upload Security Reports as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Vulnerability-Test-Results
          path: 'Vulnerability Test Results/'

      - name: Publish GitHub Action Summary
        run: |
          cat "Vulnerability Test Results/executive-summary.md" >> $GITHUB_STEP_SUMMARY
          
      - name: Enforce Critical Vulnerability Failure
        # The prompt requires failing ONLY on Critical vulnerabilities. 
        # Our generator sets the severity in the markdown.
        run: |
          if grep -q "Critical: [1-9]" "Vulnerability Test Results/executive-summary.md"; then
            echo "::error::Critical vulnerabilities detected in the backend!"
            exit 1
          else
            echo "No Critical vulnerabilities detected. Proceeding..."
          fi
