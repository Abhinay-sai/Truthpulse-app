name: Deploy and Test

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
    outputs:
      page_url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get

      - name: Build Web Application
        # We inject the base href as the repository name so GitHub pages routes correctly
        run: flutter build web --release --base-href /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          keep_files: true

  e2e_tests:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Google Chrome (for Selenium)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          
      - name: Install E2E Dependencies
        working-directory: ./e2e
        run: npm install

      - name: Verify Deployment is Live
        run: |
          URL="${{ needs.build_and_deploy.outputs.page_url }}"
          echo "Testing against URL: $URL"
          MAX_RETRIES=12
          RETRY_COUNT=0
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]
          do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" -eq 200 ]; then
              echo "Deployment is live (HTTP 200)."
              break
            fi
            echo "Waiting for deployment... (Status: $STATUS)"
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT+1))
          done
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "Deployment did not return HTTP 200 within timeout."
            exit 1
          fi
          
      - name: Run E2E Tests
        working-directory: ./e2e
        env:
          BASE_URL: ${{ needs.build_and_deploy.outputs.page_url }}
        run: npm test

      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Results
          path: |
            e2e/Test Results/Excel/Automation_Test_Report.xlsx
            e2e/Test Results/HTML/execution-report.html
            e2e/Test Results/Screenshots/
            e2e/Test Results/Logs/
            e2e/Test Results/Summary/summary.md
          
      - name: Publish Test Summary to GitHub Actions
        if: always()
        run: |
          if [ -f "e2e/Test Results/Summary/summary.md" ]; then
            cat "e2e/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "Test summary markdown not found." >> $GITHUB_STEP_SUMMARY
          fi
