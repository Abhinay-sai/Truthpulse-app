name: Live Web Deployment & Selenium E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy-test:
    name: Build, Deploy & E2E Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

    steps:
      - name: Stage 1 - Checkout Repository
        uses: actions/checkout@v4

      - name: Stage 2 - Install Flutter & Node Dependencies
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Install Node Dependencies
        working-directory: ./web-automation
        run: npm ci || npm install

      - name: Stage 3 - Build Application (Flutter Web)
        run: flutter build web --release --base-href /${{ github.event.repository.name }}/

      - name: Stage 4 - Static Analysis
        run: echo "Assuming SAST passed in prior security workflow"

      - name: Stage 5 - Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          keep_files: false

      - name: Stage 6 & 7 - Deployment Verification & Polling
        run: |
          echo "Waiting for GitHub Pages to propagate at $BASE_URL..."
          MAX_RETRIES=30
          RETRY_COUNT=0
          SUCCESS=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\\n" $BASE_URL)
            if [ "$HTTP_STATUS" == "200" ]; then
              echo "Deployment is LIVE! HTTP 200 Received."
              SUCCESS=1
              break
            else
              echo "Polling... HTTP $HTTP_STATUS received. Retrying in 10s..."
              sleep 10
              RETRY_COUNT=$((RETRY_COUNT+1))
            fi
          done

          if [ $SUCCESS -eq 0 ]; then
            echo "Deployment Verification FAILED. URL did not return HTTP 200."
            exit 1
          fi

      - name: Stage 8 & 9 & 10 - Run Selenium E2E & Generate Reports
        working-directory: ./web-automation
        run: |
          node data/generate_tests.js
          npm test
          node utils/summary.js > $GITHUB_STEP_SUMMARY

      - name: Stage 11 & 13 - Upload Artifacts & Store History
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Live-Reports
          path: web-automation/Test Results/
          retention-days: 30
