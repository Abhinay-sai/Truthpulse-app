name: Enterprise Android Appium E2E CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # Run nightly

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Stage 1 - Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stage 2 - Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Stage 3 - Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Stage 4 - Install Node Dependencies
        working-directory: ./automation
        run: npm ci || npm install

      - name: Stage 5 - Build Android APK
        run: |
          flutter pub get
          flutter build apk --debug
          
      - name: Stage 6 - Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Stage 7 - 17 - Emulator, Appium, and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            echo "Starting Appium Server..."
            appium &
            sleep 10
            echo "Executing Test Suite..."
            cd automation
            node data/generate_tests.js
            npm test
            node utils/summary.js > $GITHUB_STEP_SUMMARY

      - name: Stage 18 - Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Automation-Reports
          path: automation/Test Results/
          retention-days: 30
          
      - name: Stage 19 - Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./automation/Test Results
          destination_dir: reports/latest
          keep_files: true # We would need a custom script to archive old runs, keeping it simple for GH pages action
