name: Android Appium E2E

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-e2e:
    runs-on: macos-13
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --debug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium & E2E Dependencies
        working-directory: ./android-e2e
        run: |
          npm install -g appium
          appium driver install uiautomator2
          npm install

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          profile: Nexus 6
          script: |
            # Start appium in background
            appium &
            sleep 15
            cd android-e2e
            npm test

      - name: Upload Test Results Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Test-Results
          path: |
            android-e2e/Test Results/Excel/Automation_Test_Report.xlsx
            android-e2e/Test Results/HTML/execution-report.html
            android-e2e/Test Results/Screenshots/
            android-e2e/Test Results/Logs/
            android-e2e/Test Results/Summary/summary.md

      - name: Publish Test Summary to GitHub Actions
        if: always()
        run: |
          if [ -f "android-e2e/Test Results/Summary/summary.md" ]; then
            cat "android-e2e/Test Results/Summary/summary.md" >> $GITHUB_STEP_SUMMARY
          else
            echo "Test summary markdown not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Prepare Reports for GitHub Pages
        if: always()
        run: |
          mkdir -p gh-pages-deploy/reports/latest
          mkdir -p gh-pages-deploy/reports/history/build-${{ github.run_number }}
          
          # Copy to latest
          cp -r android-e2e/Test\ Results/HTML/* gh-pages-deploy/reports/latest/ || true
          cp -r android-e2e/Test\ Results/Screenshots gh-pages-deploy/reports/latest/ || true
          cp -r android-e2e/Test\ Results/Logs gh-pages-deploy/reports/latest/ || true
          cp -r android-e2e/Test\ Results/Summary/* gh-pages-deploy/reports/latest/ || true
          
          # Copy to history
          cp -r gh-pages-deploy/reports/latest/* gh-pages-deploy/reports/history/build-${{ github.run_number }}/ || true

      - name: Deploy Reports to gh-pages branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-deploy
          keep_files: true
